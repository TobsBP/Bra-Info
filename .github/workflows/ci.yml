name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Format (Biome)
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          # Necessary for build validation if your app uses static generation
          BRASILAPI_URL: https://brasilapi.com.br/api
          AWESOMEAPI_URL: https://economia.awesomeapi.com.br
          PARALLELUM_URL: https://parallelum.com.br/fipe/api/v1
          NEXT_PUBLIC_APP_NAME: "Bra-Info"
